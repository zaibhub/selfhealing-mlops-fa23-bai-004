global:
  scrape_interval: 10s
  evaluation_interval: 15s

rule_files:
  - "alert.rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  - job_name: "sentiment-ml-exporter"
    static_configs:
      - targets: ["host.docker.internal:8000"]
