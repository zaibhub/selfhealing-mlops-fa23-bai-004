groups:
  - name: model_confidence_alerts
    rules:
      - alert: ModelConfidenceDrift
        expr: prediction_confidence_score < 0.553
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Model confidence dropped below threshold"
          description: "prediction_confidence_score has been below 0.553 for more than 1 minute"
